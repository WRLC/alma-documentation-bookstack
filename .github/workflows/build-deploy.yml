#file: noinspection UndefinedAction,UndefinedParamsPresent
name: Terraform, Build, and Deploy to Stage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_OIDC: true
  TF_VAR_existing_app_service_plan_name: ${{ secrets.EXISTING_APP_SERVICE_PLAN_NAME }}
  TF_VAR_existing_app_service_plan_rg: ${{ secrets.EXISTING_APP_SERVICE_PLAN_RG }}
  TF_VAR_existing_log_analytics_workspace_name: ${{ secrets.EXISTING_LOG_ANALYTICS_WORKSPACE_NAME }}
  TF_VAR_existing_log_analytics_workspace_rg: ${{ secrets.EXISTING_LOG_ANALYTICS_WORKSPACE_RG }}
  TF_VAR_existing_mysql_server_name: ${{ secrets.EXISTING_MYSQL_SERVER_NAME }}
  TF_VAR_existing_mysql_server_rg: ${{ secrets.EXISTING_MYSQL_SERVER_RG }}
  TF_VAR_existing_acs_name: ${{ secrets.EXISTING_ACS_NAME }}
  TF_VAR_existing_acs_rg: ${{ secrets.EXISTING_ACS_RG }}
  TF_VAR_mysql_admin_username: ${{ secrets.MYSQL_ADMIN_USER }}
  TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}
  TF_VAR_app_url: ${{ secrets.APP_URL }}
  TF_VAR_app_key: ${{ secrets.APP_KEY }}
  TF_VAR_mail_from_name: ${{ secrets.MAIL_FROM_NAME }}
  TF_VAR_mail_from: ${{ secrets.MAIL_FROM }}
  TF_VAR_file_upload_size_limit: ${{ secrets.FILE_UPLOAD_SIZE_LIMIT }}
  TF_VAR_allowed_iframe_sources: ${{ secrets.ALLOWED_IFRAME_SOURCES }}
  TF_WORKING_DIR: ./terraform

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    outputs:
      app_service_name: ${{ steps.get_outputs.outputs.app_service_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        id: get_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          APP_NAME=$(terraform output -raw app_service_name)
          echo "app_service_name=$APP_NAME" >> "$GITHUB_OUTPUT"

  deploy-stage:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    environment: staging
    needs: [terraform]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Deploy source files to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ needs.terraform.outputs.app_service_name }}
          slot-name: 'stage'
          package: .


